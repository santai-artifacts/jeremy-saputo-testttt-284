<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .game-wrapper {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 20px;
      display: inline-block;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 20px;
    }

    .score {
      font-size: 1.3em;
      font-weight: bold;
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    #gameCanvas {
      border: 3px solid #333;
      background: #1a1a2e;
      display: block;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .instructions {
      color: #666;
      font-size: 0.9em;
      margin-top: 15px;
      line-height: 1.6;
    }

    .game-over-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .game-over-modal.show {
      display: flex;
    }

    .game-over-content {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    .game-over-content h2 {
      font-size: 2.5em;
      color: #764ba2;
      margin-bottom: 20px;
    }

    .game-over-content p {
      font-size: 1.3em;
      color: #333;
      margin-bottom: 30px;
    }

    .game-over-content button {
      padding: 12px 30px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 Snake Game</h1>
    <div class="game-wrapper">
      <div class="controls">
        <div class="score">Score: <span id="score">0</span></div>
        <button id="startBtn">Start Game</button>
      </div>
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="instructions">
        <strong>Controls:</strong> Arrow keys to move<br>
        Eat the red food to grow and earn points
      </div>
    </div>
  </div>

  <div class="game-over-modal" id="gameOverModal">
    <div class="game-over-content">
      <h2>Game Over!</h2>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');
    const gameOverModal = document.getElementById('gameOverModal');
    const finalScoreDisplay = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let direction = {x: 1, y: 0};
    let nextDirection = {x: 1, y: 0};
    let score = 0;
    let gameRunning = false;
    let gameActive = false;

    function drawTile(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * gridSize, y * gridSize, gridSize - 2, gridSize - 2);
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw snake
      snake.forEach((segment, index) => {
        if (index === 0) {
          drawTile(segment.x, segment.y, '#00ff88');
        } else {
          drawTile(segment.x, segment.y, '#00cc66');
        }
      });

      // Draw food
      drawTile(food.x, food.y, '#ffff00');
    }

    function update() {
      if (!gameRunning) return;

      direction = nextDirection;

      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

      // Check wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        endGame();
        return;
      }

      // Check self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreDisplay.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function spawnFood() {
      let newFood;
      let isOnSnake;
      do {
        isOnSnake = false;
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        isOnSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
      } while (isOnSnake);
      food = newFood;
    }

    function gameLoop() {
      update();
      draw();
      setTimeout(gameLoop, 100);
    }

    function startGame() {
      if (!gameActive) return;
      gameRunning = true;
      startBtn.textContent = 'Pause';
      gameOverModal.classList.remove('show');
    }

    function pauseGame() {
      gameRunning = false;
      startBtn.textContent = 'Resume';
    }

    function endGame() {
      gameRunning = false;
      gameActive = false;
      finalScoreDisplay.textContent = score;
      gameOverModal.classList.add('show');
      startBtn.textContent = 'Start Game';
    }

    function resetGame() {
      snake = [{x: 10, y: 10}];
      food = {x: 15, y: 15};
      direction = {x: 1, y: 0};
      nextDirection = {x: 1, y: 0};
      score = 0;
      scoreDisplay.textContent = score;
      gameActive = true;
      gameOverModal.classList.remove('show');
      startBtn.textContent = 'Start Game';
      draw();
    }

    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;

      const key = e.key;

      // Prevent page scrolling
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        e.preventDefault();
      }

      // Update direction (prevent 180 degree turns)
      if (key === 'ArrowUp' && direction.y === 0) nextDirection = {x: 0, y: -1};
      else if (key === 'ArrowDown' && direction.y === 0) nextDirection = {x: 0, y: 1};
      else if (key === 'ArrowLeft' && direction.x === 0) nextDirection = {x: -1, y: 0};
      else if (key === 'ArrowRight' && direction.x === 0) nextDirection = {x: 1, y: 0};

      if (!gameRunning) {
        gameActive = true;
        startGame();
      }
    });

    startBtn.addEventListener('click', () => {
      if (!gameActive) {
        resetGame();
        startGame();
      } else if (gameRunning) {
        pauseGame();
      } else {
        startGame();
      }
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      startGame();
    });

    // Initial draw
    gameActive = true;
    draw();
    gameLoop();
  </script>
</body>
</html>
